<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode:'class',
      theme:{ extend:{ colors:{ primary:"#137fec" }, fontFamily:{ display:["Lexend"] } } }
    }
  </script>
  <title>Lab Schedule — NIE ClassPulse</title>
  <style>
    body { font-family:'Lexend',sans-serif; }
    .now-glow { box-shadow: 0 0 20px rgba(19,127,236,0.35); }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen text-slate-900 dark:text-slate-100 transition-colors">

<header class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
  <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="/" class="flex items-center gap-2 text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>
      <img src="/logo.png" alt="NIE ClassPulse" class="h-9 w-9 rounded-xl object-cover" onerror="this.style.display='none'"/>
      <div>
        <h1 class="text-lg font-bold">Lab Schedule</h1>
        <p class="text-xs text-slate-400">NIE ClassPulse · Even Semester 2025-26</p>
      </div>
    </div>
    <button onclick="toggleTheme()" class="size-9 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800">
      <span id="theme-icon" class="material-symbols-outlined text-slate-600 dark:text-slate-300 text-xl">dark_mode</span>
    </button>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-8 pb-24">

  <div class="mb-6">
    <div class="flex items-center gap-3 mb-2">
      <div class="size-10 rounded-xl bg-purple-100 dark:bg-purple-900/30 flex items-center justify-center">
        <span class="material-symbols-outlined text-purple-600 dark:text-purple-400">science</span>
      </div>
      <div>
        <h2 class="text-2xl font-bold">Lab Sessions</h2>
        <p class="text-sm text-slate-400">Which class has which lab and when</p>
      </div>
    </div>
    <div class="flex items-center gap-2 mt-3 p-3 bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-800 rounded-xl">
      <span class="material-symbols-outlined text-amber-500 text-sm">info</span>
      <p class="text-xs text-amber-700 dark:text-amber-400">During lab hours the classroom is <strong>vacant</strong> — students are in the lab. Read-only info.</p>
    </div>
  </div>

  <!-- Day Tabs -->
  <div class="flex flex-wrap gap-2 mb-4">
    <button class="day-tab px-3 py-1.5 rounded-xl text-xs font-bold bg-primary text-white" data-day="all">All Days</button>
    <button class="day-tab px-3 py-1.5 rounded-xl text-xs font-bold bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300" data-day="Monday">Monday</button>
    <button class="day-tab px-3 py-1.5 rounded-xl text-xs font-bold bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300" data-day="Tuesday">Tuesday</button>
    <button class="day-tab px-3 py-1.5 rounded-xl text-xs font-bold bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300" data-day="Wednesday">Wednesday</button>
    <button class="day-tab px-3 py-1.5 rounded-xl text-xs font-bold bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300" data-day="Thursday">Thursday</button>
    <button class="day-tab px-3 py-1.5 rounded-xl text-xs font-bold bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300" data-day="Friday">Friday</button>
  </div>

  <!-- Filters -->
  <div class="flex flex-wrap gap-2 mb-5">
    <select id="filter-sem" class="px-3 py-2 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-sm font-medium focus:ring-2 focus:ring-primary outline-none">
      <option value="all">All Semesters</option>
      <option value="II">2nd Semester</option>
      <option value="IV">4th Semester</option>
      <option value="VI">6th Semester</option>
    </select>
    <select id="filter-dept" class="px-3 py-2 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-sm font-medium focus:ring-2 focus:ring-primary outline-none">
      <option value="all">All Departments</option>
      <option value="CSE">CSE</option>
      <option value="ISE">ISE</option>
      <option value="AIML">CSE (AI&ML)</option>
    </select>
    <div class="relative flex-1 min-w-48">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-base">search</span>
      <input id="lab-search" type="text" placeholder="Search lab, section, batch..."
             class="w-full pl-9 pr-3 py-2 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-900 text-sm focus:ring-2 focus:ring-primary outline-none"/>
    </div>
  </div>

  <div class="flex items-center gap-2 mb-4">
    <span class="material-symbols-outlined text-purple-500 text-base">science</span>
    <span class="font-bold text-sm">Lab Sessions</span>
    <span id="lab-count" class="text-slate-400 text-sm"></span>
  </div>

  <div id="lab-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  <div id="empty-state" class="hidden text-center py-16">
    <span class="material-symbols-outlined text-5xl text-slate-300 block mb-3">search_off</span>
    <p class="text-slate-400">No lab sessions found</p>
  </div>
</main>

<script>
function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-icon').textContent = isDark ? 'light_mode' : 'dark_mode';
}
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('theme-icon').textContent =
    document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
});
</script>

const DAYS_ORDER = ['Monday','Tuesday','Wednesday','Thursday','Friday'];

function fmtTime(t) {
  if (!t || t === '00:00') return '';
  const [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h > 12 ? h - 12 : h === 0 ? 12 : h;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

// Split "A1 (MMA+SKJ)" into { batch: "A1", faculty: "MMA + SKJ" }
function parseBatch(raw) {
  const match = raw.match(/^([^\(]+)\s*\(([^\)]+)\)\s*$/);
  if (match) {
    const batchNum = match[1].trim();
    const faculty  = match[2].trim().replace(/\+/g, ' + ');
    return { batchNum, faculty };
  }
  return { batchNum: raw.trim(), faculty: '' };
}

function getLabStyle(name) {
  const n = name.toUpperCase();
  if (n.includes('CHE'))     return { bg:'bg-orange-500', light:'bg-orange-50 dark:bg-orange-900/20', text:'text-orange-600 dark:text-orange-300', icon:'science' };
  if (n.includes('PHY'))     return { bg:'bg-blue-500',   light:'bg-blue-50 dark:bg-blue-900/20',     text:'text-blue-600 dark:text-blue-300',     icon:'bolt' };
  if (n.includes('IDT'))     return { bg:'bg-green-500',  light:'bg-green-50 dark:bg-green-900/20',   text:'text-green-600 dark:text-green-300',   icon:'engineering' };
  if (n.includes('PLC'))     return { bg:'bg-yellow-500', light:'bg-yellow-50 dark:bg-yellow-900/20', text:'text-yellow-600 dark:text-yellow-300', icon:'memory' };
  if (n.includes('PSC'))     return { bg:'bg-teal-500',   light:'bg-teal-50 dark:bg-teal-900/20',     text:'text-teal-600 dark:text-teal-300',     icon:'biotech' };
  if (n.includes('UI') || n.includes('UX')) return { bg:'bg-pink-500', light:'bg-pink-50 dark:bg-pink-900/20', text:'text-pink-600 dark:text-pink-300', icon:'design_services' };
  if (n.includes('IOT'))     return { bg:'bg-cyan-500',   light:'bg-cyan-50 dark:bg-cyan-900/20',     text:'text-cyan-600 dark:text-cyan-300',     icon:'device_hub' };
  if (n.includes('PYTORCH')) return { bg:'bg-purple-500', light:'bg-purple-50 dark:bg-purple-900/20', text:'text-purple-600 dark:text-purple-300', icon:'psychology' };
  if (n.includes('DEEP') || n.includes('DL')) return { bg:'bg-purple-600', light:'bg-purple-50 dark:bg-purple-900/20', text:'text-purple-600 dark:text-purple-300', icon:'psychology' };
  if (n.includes('ML'))      return { bg:'bg-violet-500', light:'bg-violet-50 dark:bg-violet-900/20', text:'text-violet-600 dark:text-violet-300', icon:'model_training' };
  if (n.includes('MERN'))    return { bg:'bg-indigo-500', light:'bg-indigo-50 dark:bg-indigo-900/20', text:'text-indigo-600 dark:text-indigo-300', icon:'code' };
  if (n.includes('FSD') || n.includes('FULL')) return { bg:'bg-indigo-500', light:'bg-indigo-50 dark:bg-indigo-900/20', text:'text-indigo-600 dark:text-indigo-300', icon:'code' };
  if (n.includes('DEVOPS'))  return { bg:'bg-slate-600',  light:'bg-slate-100 dark:bg-slate-800',     text:'text-slate-600 dark:text-slate-300',   icon:'cloud' };
  if (n.includes('ADA') || n.includes('DBMS') || n.includes('AJ')) return { bg:'bg-teal-500', light:'bg-teal-50 dark:bg-teal-900/20', text:'text-teal-600 dark:text-teal-300', icon:'storage' };
  if (n.includes('AI'))      return { bg:'bg-fuchsia-500',light:'bg-fuchsia-50 dark:bg-fuchsia-900/20',text:'text-fuchsia-600 dark:text-fuchsia-300',icon:'smart_toy' };
  if (n.includes('MC&ES') || n.includes('MC ')) return { bg:'bg-rose-500', light:'bg-rose-50 dark:bg-rose-900/20', text:'text-rose-600 dark:text-rose-300', icon:'memory' };
  return { bg:'bg-slate-500', light:'bg-slate-100 dark:bg-slate-800', text:'text-slate-600 dark:text-slate-300', icon:'science' };
}

function getIST() {
  const now = new Date();
  const utcMs = now.getTime() + (now.getTimezoneOffset() * 60 * 1000);
  const ist = new Date(utcMs + 5.5 * 60 * 60 * 1000);
  return {
    time: `${String(ist.getHours()).padStart(2,'0')}:${String(ist.getMinutes()).padStart(2,'0')}`,
    day: ist.toLocaleDateString('en-US', { weekday: 'long' })
  };
}

let activeDay = 'all', activeSem = 'all', activeDept = 'all', searchQ = '';

function deptMatch(dept) {
  if (activeDept === 'all') return true;
  if (activeDept === 'CSE')  return dept === 'CSE';
  if (activeDept === 'ISE')  return dept === 'ISE';
  if (activeDept === 'AIML') return dept === 'CSE (AI&ML)';
  return true;
}

function semLabel(s) {
  return s === 'II' ? '2nd Sem' : s === 'IV' ? '4th Sem' : s === 'VI' ? '6th Sem' : s;
}

function renderLabs() {
  const { time: now, day: today } = getIST();
  const grid = document.getElementById('lab-grid');
  const empty = document.getElementById('empty-state');
  const countEl = document.getElementById('lab-count');

  let filtered = [...LAB_DATA];
  if (activeDay !== 'all') filtered = filtered.filter(l => l.day === activeDay);
  if (activeSem !== 'all') filtered = filtered.filter(l => l.semester === activeSem);
  filtered = filtered.filter(l => deptMatch(l.dept));
  if (searchQ) {
    const q = searchQ.toLowerCase();
    filtered = filtered.filter(l =>
      l.lab_name.toLowerCase().includes(q) ||
      l.section.toLowerCase().includes(q) ||
      l.dept.toLowerCase().includes(q) ||
      l.batch.toLowerCase().includes(q) ||
      l.lab_room.toLowerCase().includes(q)
    );
  }

  countEl.textContent = `(${filtered.length} sessions)`;

  if (!filtered.length) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  const byDay = {};
  DAYS_ORDER.forEach(d => byDay[d] = []);
  filtered.forEach(l => { if (byDay[l.day]) byDay[l.day].push(l); });

  const daysToShow = activeDay === 'all' ? DAYS_ORDER : [activeDay];
  let html = '';

  for (const day of daysToShow) {
    const entries = (byDay[day] || []).sort((a,b) => a.start.localeCompare(b.start));
    if (!entries.length) continue;
    const isToday = day === today;

    html += `<div class="col-span-full mt-4 mb-2 flex items-center gap-2">
      <span class="text-base font-bold ${isToday ? 'text-primary' : 'text-slate-600 dark:text-slate-300'}">${day}</span>
      ${isToday ? '<span class="text-xs bg-primary/10 text-primary px-2 py-0.5 rounded-full font-semibold">Today</span>' : ''}
      <span class="text-xs text-slate-400">${entries.length} sessions</span>
    </div>`;

    // Group entries by full class context so unrelated sections/depts/semesters
    // never get merged into one card.
    const bySlot = {};
    for (const lab of entries) {
      const slotKey = [
        lab.semester,
        lab.dept,
        lab.section,
        lab.day,
        lab.start,
        lab.end
      ].join('|');
      if (!bySlot[slotKey]) bySlot[slotKey] = [];
      bySlot[slotKey].push(lab);
    }

    // Sort slots by start time
    const sortedSlots = Object.keys(bySlot).sort((a,b) => a.localeCompare(b));

    for (const slotKey of sortedSlots) {
      const slotEntries = bySlot[slotKey].sort((a, b) => {
        const aBatch = parseBatch(a.batch).batchNum;
        const bBatch = parseBatch(b.batch).batchNum;
        return aBatch.localeCompare(bBatch) || a.lab_name.localeCompare(b.lab_name);
      });
      const firstLab = slotEntries[0];
      const isNow = isToday && now >= firstLab.start && now < firstLab.end;

      // If multiple different labs at same time — show as one grouped card
      if (slotEntries.length > 1) {
        html += `
          <div class="col-span-full bg-white dark:bg-slate-900 rounded-2xl border ${isNow ? 'border-primary now-glow' : 'border-slate-200 dark:border-slate-800'} overflow-hidden transition-all">
            <div class="h-1.5 bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500"></div>
            <div class="p-5">
              ${isNow ? `<div class="flex items-center gap-1.5 mb-3">
                <span class="w-2 h-2 rounded-full bg-primary animate-pulse inline-block"></span>
                <span class="text-xs font-bold text-primary uppercase tracking-wide">Happening Now</span>
              </div>` : ''}
              <div class="flex items-center gap-2 mb-4">
                <span class="material-symbols-outlined text-slate-400 text-sm">schedule</span>
                <span class="text-sm font-bold text-slate-700 dark:text-slate-200">${fmtTime(firstLab.start)} – ${fmtTime(firstLab.end)}</span>
                <span class="text-xs text-slate-400">· ${semLabel(firstLab.semester)} ${firstLab.dept} Sec-${firstLab.section}</span>
                <span class="text-xs bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 px-2 py-0.5 rounded-full font-semibold ml-auto">Batches split across labs</span>
              </div>
              <div class="space-y-2">
                ${slotEntries.map(lab => {
                  const s = getLabStyle(lab.lab_name);
                  return `<div class="flex items-center gap-3 p-3 rounded-xl ${s.light}">
                    <div class="size-9 rounded-lg bg-white/60 dark:bg-slate-900/40 flex items-center justify-center shrink-0">
                      <span class="material-symbols-outlined ${s.text} text-lg">${s.icon}</span>
                    </div>
                    <div class="flex-1 min-w-0">
                      <p class="font-bold text-sm text-slate-900 dark:text-white">${lab.lab_name}</p>
                      <p class="text-xs ${s.text} font-semibold">Batch: ${parseBatch(lab.batch).batchNum}</p>
                      ${parseBatch(lab.batch).faculty ? `<p class="text-xs text-slate-500 dark:text-slate-400">👨‍🏫 ${parseBatch(lab.batch).faculty}</p>` : ''}
                    </div>
                    <div class="flex items-center gap-1 shrink-0">
                      <span class="material-symbols-outlined text-primary text-sm">location_on</span>
                      <span class="text-xs font-bold text-primary">${lab.lab_room || 'TBD'}</span>
                    </div>
                  </div>`;
                }).join('')}
              </div>
            </div>
          </div>`;
      } else {
        // Single entry — show as individual card
        const lab = slotEntries[0];
        const style = getLabStyle(lab.lab_name);
        html += `
          <div class="bg-white dark:bg-slate-900 rounded-2xl border ${isNow ? 'border-primary now-glow' : 'border-slate-200 dark:border-slate-800'} overflow-hidden transition-all">
            <div class="h-1.5 ${style.bg}"></div>
            <div class="p-5">
              ${isNow ? `<div class="flex items-center gap-1.5 mb-3">
                <span class="w-2 h-2 rounded-full ${style.bg} animate-pulse inline-block"></span>
                <span class="text-xs font-bold text-primary uppercase tracking-wide">Happening Now</span>
              </div>` : ''}
              <div class="flex items-center gap-3 mb-4">
                <div class="size-11 rounded-xl ${style.light} flex items-center justify-center shrink-0">
                  <span class="material-symbols-outlined ${style.text} text-xl">${style.icon}</span>
                </div>
                <div>
                  <p class="font-bold text-lg leading-tight text-slate-900 dark:text-white">${lab.lab_name}</p>
                  <p class="text-xs text-slate-400 mt-0.5">${semLabel(lab.semester)} · ${lab.dept}</p>
                </div>
              </div>
              <div class="space-y-2">
                <div class="flex items-center justify-between p-3 rounded-xl bg-slate-50 dark:bg-slate-800">
                  <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-slate-400 text-sm">groups</span>
                    <span class="text-sm font-bold">${lab.dept} - Sec ${lab.section}</span>
                  </div>
  <div class="text-right">
                    <span class="text-xs font-semibold px-2 py-0.5 rounded-lg ${style.light} ${style.text} block">Batch ${parseBatch(lab.batch).batchNum}</span>
                    ${parseBatch(lab.batch).faculty ? `<span class="text-xs text-slate-400 mt-0.5 block">👨‍🏫 ${parseBatch(lab.batch).faculty}</span>` : ''}
                  </div>
                </div>
                <div class="flex items-center gap-2 px-1">
                  <span class="material-symbols-outlined text-slate-400 text-sm">schedule</span>
                  <span class="text-sm font-semibold text-slate-600 dark:text-slate-300">${fmtTime(lab.start)} – ${fmtTime(lab.end)}</span>
                </div>
                <div class="flex items-center gap-2 p-2.5 rounded-xl bg-primary/5 dark:bg-primary/10 border border-primary/20">
                  <span class="material-symbols-outlined text-primary text-sm">location_on</span>
                  <span class="text-sm font-bold text-primary">${lab.lab_room || 'Location TBD'}</span>
                </div>
              </div>
            </div>
          </div>`;
      }
    }
  }

  grid.innerHTML = html;
}

document.querySelectorAll('.day-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    activeDay = tab.dataset.day;
    document.querySelectorAll('.day-tab').forEach(t => {
      t.className = 'day-tab px-3 py-1.5 rounded-xl text-xs font-bold bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300';
    });
    tab.className = 'day-tab px-3 py-1.5 rounded-xl text-xs font-bold bg-primary text-white';
    renderLabs();
  });
});

document.getElementById('filter-sem').addEventListener('change', e => { activeSem = e.target.value; renderLabs(); });
document.getElementById('filter-dept').addEventListener('change', e => { activeDept = e.target.value; renderLabs(); });
document.getElementById('lab-search').addEventListener('input', e => { searchQ = e.target.value.trim(); renderLabs(); });

renderLabs();
setInterval(renderLabs, 60000);
</script>
