<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: "#137fec" }, fontFamily: { display: ["Lexend"] } } }
    }
  </script>
  <title>Room Detail — NIE ClassPulse</title>
  <style>
    body { font-family: 'Lexend', sans-serif; }
    .loader { width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#137fec;border-radius:50%;animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

<!-- Header -->
<header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
  <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2 text-slate-600 hover:text-primary transition-colors">
      <span class="material-symbols-outlined">arrow_back</span>
      <span class="font-medium text-sm">Back to Dashboard</span>
    </a>
    <div class="flex items-center gap-2">
      <div class="bg-primary p-1.5 rounded-lg text-white">
        <span class="material-symbols-outlined text-sm">pulse_alert</span>
      </div>
      <span class="font-bold text-slate-900">NIE ClassPulse</span>
    </div>
  </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-8">

  <!-- Loading state -->
  <div id="loading" class="flex justify-center py-20">
    <div class="loader"></div>
  </div>

  <!-- Content (hidden until loaded) -->
  <div id="content" class="hidden">

    <!-- Room header -->
    <div class="bg-white rounded-2xl border border-slate-200 p-8 mb-6 shadow-sm">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
        <div>
          <h1 id="room-number" class="text-4xl font-bold text-slate-900">—</h1>
          <p id="room-location" class="text-slate-500 mt-1">—</p>
          <div id="status-badge" class="mt-3"></div>
        </div>

        <!-- Editor controls (only for teachers/CRs) -->
        <div id="editor-panel" class="hidden bg-slate-50 rounded-xl p-5 border border-slate-200 min-w-72">
          <p class="text-xs text-slate-500 uppercase font-bold mb-3">Update Room Status</p>

          <div class="space-y-3 mb-4">
            <input id="inp-subject" placeholder="Subject name" type="text"
                   class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-primary outline-none"/>
            <input id="inp-faculty" placeholder="Faculty name" type="text"
                   class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-primary outline-none"/>
            <div class="flex gap-2">
              <input id="inp-start" type="time"
                     class="flex-1 px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-primary outline-none"/>
              <input id="inp-end" type="time"
                     class="flex-1 px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-primary outline-none"/>
            </div>
          </div>

          <div class="flex gap-2">
            <button id="btn-occupy"
                    class="flex-1 bg-red-500 text-white text-sm font-semibold py-2 rounded-lg hover:bg-red-600 transition-colors">
              Mark Occupied
            </button>
            <button id="btn-vacate"
                    class="flex-1 bg-green-500 text-white text-sm font-semibold py-2 rounded-lg hover:bg-green-600 transition-colors">
              Mark Vacant
            </button>
          </div>
          <p id="update-msg" class="text-xs text-center mt-2 text-slate-400"></p>
        </div>
      </div>
    </div>

    <!-- Room Info -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-white rounded-xl border border-slate-200 p-5">
        <div class="flex items-center gap-3 mb-2">
          <span class="material-symbols-outlined text-primary">groups</span>
          <span class="text-xs text-slate-500 uppercase font-bold">Capacity</span>
        </div>
        <p id="room-capacity" class="text-xl font-bold">—</p>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-5">
        <div class="flex items-center gap-3 mb-2">
          <span class="material-symbols-outlined text-primary">laptop_mac</span>
          <span class="text-xs text-slate-500 uppercase font-bold">Facilities</span>
        </div>
        <p id="room-facilities" class="text-sm font-medium text-slate-700">—</p>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-5">
        <div class="flex items-center gap-3 mb-2">
          <span class="material-symbols-outlined text-primary">school</span>
          <span class="text-xs text-slate-500 uppercase font-bold">Department</span>
        </div>
        <p id="room-dept" class="text-sm font-medium text-slate-700">—</p>
      </div>
    </div>

    <!-- Today's Schedule -->
    <div class="bg-white rounded-2xl border border-slate-200 p-6">
      <h2 class="text-base font-bold mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-primary">calendar_today</span>
        Today's Schedule
      </h2>
      <div id="schedule-list">
        <div class="flex justify-center py-6"><div class="loader"></div></div>
      </div>
    </div>

  </div>

  <!-- Error state -->
  <div id="error-state" class="hidden text-center py-20">
    <span class="material-symbols-outlined text-5xl text-slate-300 block mb-3">error</span>
    <p class="text-slate-500">Room not found.</p>
    <a href="/" class="text-primary text-sm mt-2 inline-block hover:underline">← Go back</a>
  </div>
</main>

<script type="module">
  import { getRoomById, getRoomSchedule, updateRoomStatus } from '/js/rooms.js';
  import { getUser, getUserRole } from '/js/auth.js';

  const params = new URLSearchParams(window.location.search);
  const roomId = params.get('id');

  if (!roomId) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error-state').classList.remove('hidden');
  } else {
    load();
  }

  async function load() {
    try {
      const [room, role] = await Promise.all([
        getRoomById(roomId),
        getUserRole()
      ]);

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');

      // Fill details
      document.getElementById('room-number').textContent    = room.room_number;
      document.getElementById('room-location').textContent  = `${room.building} • ${room.floor}`;
      document.getElementById('room-capacity').textContent  = `${room.capacity ?? '—'} Students`;
      document.getElementById('room-facilities').textContent= room.facilities ?? '—';
      document.getElementById('room-dept').textContent      = room.department ?? '—';

      // Status badge
      const badge = document.getElementById('status-badge');
      const colors = { vacant:'green', occupied:'red', free_soon:'amber' };
      const labels = { vacant:'Vacant', occupied:'Occupied', free_soon:'Free Soon' };
      const c = colors[room.status] ?? 'slate';
      badge.innerHTML = `<span class="bg-${c}-100 text-${c}-700 text-sm font-bold px-3 py-1 rounded-full uppercase">${labels[room.status] ?? room.status}</span>`;

      // Show editor if teacher or CR
      if (role === 'teacher' || role === 'cr') {
        document.getElementById('editor-panel').classList.remove('hidden');
        bindEditorButtons(room);
      }

      // Load schedule
      loadSchedule(roomId);

    } catch (err) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error-state').classList.remove('hidden');
    }
  }

  async function loadSchedule(id) {
    const scheduleEl = document.getElementById('schedule-list');
    try {
      const slots = await getRoomSchedule(id);
      if (!slots.length) {
        scheduleEl.innerHTML = '<p class="text-slate-400 text-sm text-center py-4">No classes scheduled today.</p>';
        return;
      }
      scheduleEl.innerHTML = slots.map(s => `
        <div class="flex items-center gap-4 py-3 border-b border-slate-100 last:border-0">
          <div class="text-sm font-bold text-primary w-28 shrink-0">${s.start_time} – ${s.end_time}</div>
          <div>
            <p class="font-semibold text-slate-900 text-sm">${s.subject}</p>
            <p class="text-xs text-slate-500">${s.faculty} • ${s.section}</p>
          </div>
        </div>`).join('');
    } catch {
      scheduleEl.innerHTML = '<p class="text-red-400 text-sm">Could not load schedule.</p>';
    }
  }

  function bindEditorButtons(room) {
    const msg = document.getElementById('update-msg');

    document.getElementById('btn-occupy').addEventListener('click', async () => {
      const subject = document.getElementById('inp-subject').value.trim();
      const faculty = document.getElementById('inp-faculty').value.trim();
      const start   = document.getElementById('inp-start').value;
      const end     = document.getElementById('inp-end').value;

      if (!subject) { msg.textContent = 'Please enter a subject name.'; msg.style.color='red'; return; }

      try {
        await updateRoomStatus(room.id, 'occupied', { subject, faculty, start, end });
        msg.textContent = '✅ Status updated!'; msg.style.color='green';
        setTimeout(() => location.reload(), 800);
      } catch (err) {
        msg.textContent = err.message; msg.style.color='red';
      }
    });

    document.getElementById('btn-vacate').addEventListener('click', async () => {
      try {
        await updateRoomStatus(room.id, 'vacant');
        msg.textContent = '✅ Room marked vacant!'; msg.style.color='green';
        setTimeout(() => location.reload(), 800);
      } catch (err) {
        msg.textContent = err.message; msg.style.color='red';
      }
    });
  }
</script>
</body>
</html>
