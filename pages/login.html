<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode:'class',
      theme:{ extend:{ colors:{ primary:"#137fec" }, fontFamily:{ display:["Lexend"] } } }
    }
  </script>
  <title>Login — NIE ClassPulse</title>
  <style>body{ font-family:'Lexend',sans-serif; }</style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen flex items-center justify-center p-4 transition-colors">

<div class="w-full max-w-sm">

  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center size-16 bg-primary rounded-2xl text-white mb-4 shadow-lg shadow-primary/30">
      <span class="material-symbols-outlined text-3xl">pulse_alert</span>
    </div>
    <h1 class="text-2xl font-bold text-slate-900 dark:text-white">NIE ClassPulse</h1>
    <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Staff Access</p>
  </div>

  <!-- Info box -->
  <div class="bg-blue-50 dark:bg-blue-950/40 border border-blue-100 dark:border-blue-900 rounded-xl p-4 mb-6">
    <div class="flex gap-3">
      <span class="material-symbols-outlined text-primary text-xl shrink-0 mt-0.5">lock</span>
      <div class="text-sm text-slate-600 dark:text-slate-300">
        <p class="font-semibold mb-1">Anyone with the staff password can access</p>
        <p>Enter <strong>any email</strong> + the <strong>secret staff password</strong> to get editor access.</p>
        <p class="mt-1 text-xs text-slate-400">Students just open the app — no login needed.</p>
      </div>
    </div>
  </div>

  <!-- Login form -->
  <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-6 shadow-sm">
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Your Email</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
          <input id="login-email" type="email" placeholder="your@email.com"
                 class="w-full pl-10 pr-3 py-2.5 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-primary outline-none transition-all"/>
        </div>
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Staff Password</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
          <input id="login-password" type="password" placeholder="Enter staff password"
                 class="w-full pl-10 pr-10 py-2.5 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-primary outline-none transition-all"/>
          <button type="button" onclick="togglePw()"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
            <span id="pw-eye" class="material-symbols-outlined text-xl">visibility</span>
          </button>
        </div>
      </div>

      <p id="login-error" class="text-red-500 text-xs hidden"></p>
      <p id="login-info" class="text-blue-500 text-xs hidden"></p>

      <button id="login-btn"
              class="w-full bg-primary text-white font-semibold py-3 rounded-xl hover:bg-primary/90 transition-colors flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-base">login</span>Access Control Panel
      </button>
    </div>
  </div>

  <div class="text-center mt-4">
    <a href="/" class="text-sm text-slate-400 hover:text-primary transition-colors">← Back to dashboard</a>
  </div>
</div>

<script>
function togglePw() {
  const pw  = document.getElementById('login-password');
  const eye = document.getElementById('pw-eye');
  pw.type   = pw.type === 'password' ? 'text' : 'password';
  eye.textContent = pw.type === 'password' ? 'visibility' : 'visibility_off';
}
</script>

<script type="module">
  import { supabase } from '/js/supabase.js';

  // ══════════════════════════════════════════════════
  //  CHANGE THIS PASSWORD to whatever you want
  const SHARED_PASSWORD = 'NIE@ClassPulse2025';
  // ══════════════════════════════════════════════════

  const btn      = document.getElementById('login-btn');
  const errEl    = document.getElementById('login-error');
  const infoEl   = document.getElementById('login-info');

  async function doLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value.trim();

    errEl.classList.add('hidden');
    infoEl.classList.add('hidden');

    if (!email) {
      errEl.textContent = 'Please enter your email.';
      errEl.classList.remove('hidden'); return;
    }

    // Wrong password → block immediately
    if (password !== SHARED_PASSWORD) {
      errEl.textContent = '❌ Wrong password. Ask your admin for the staff password.';
      errEl.classList.remove('hidden'); return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined text-base animate-spin">progress_activity</span> Please wait…';

    // Try login first
    const { error: loginErr } = await supabase.auth.signInWithPassword({ email, password });

    if (!loginErr) {
      // Login success
      localStorage.setItem('staff_display_email', email);
      window.location.href = '/';
      return;
    }

    // If login failed because user doesn't exist → auto register silently
    if (loginErr.message.includes('Invalid login') || loginErr.message.includes('invalid_credentials')) {
      infoEl.textContent = 'First time? Setting up your access…';
      infoEl.classList.remove('hidden');

      const { error: signUpErr } = await supabase.auth.signUp({ email, password });

      if (signUpErr && !signUpErr.message.includes('already registered')) {
        errEl.textContent = 'Error: ' + signUpErr.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined text-base">login</span> Access Control Panel';
        return;
      }

      // Try login again after signup
      const { error: retryErr } = await supabase.auth.signInWithPassword({ email, password });

      if (!retryErr) {
        localStorage.setItem('staff_display_email', email);
        window.location.href = '/';
        return;
      }

      // Supabase email confirmation might be on
      if (retryErr.message.includes('Email not confirmed')) {
        errEl.textContent = '⚠️ Check your email and click the confirmation link, then try again. OR turn off "Confirm email" in Supabase → Authentication → Sign In / Providers.';
        errEl.classList.remove('hidden');
      } else {
        errEl.textContent = retryErr.message;
        errEl.classList.remove('hidden');
      }
    } else {
      errEl.textContent = loginErr.message;
      errEl.classList.remove('hidden');
    }

    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined text-base">login</span> Access Control Panel';
  }

  btn.addEventListener('click', doLogin);
  document.getElementById('login-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
