<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: "#137fec" }, fontFamily: { display: ["Lexend"] } } }
    }
  </script>
  <title>Login — NIE ClassPulse</title>
</head>
<body class="font-display bg-slate-50 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-4">
        <div class="bg-primary p-2 rounded-lg text-white">
          <span class="material-symbols-outlined">pulse_alert</span>
        </div>
        <span class="text-2xl font-bold text-slate-900">NIE ClassPulse</span>
      </div>
      <p class="text-slate-500 text-sm">Sign in to manage classroom availability</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-xl shadow-slate-200/60 p-8">
      <h2 class="text-xl font-bold text-slate-900 mb-6">Welcome back</h2>

      <!-- Error banner (hidden by default) -->
      <div id="error-msg" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3"></div>

      <!-- Form -->
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
          <input id="email"
                 type="email"
                 placeholder="you@nie.ac.in"
                 class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
          <input id="password"
                 type="password"
                 placeholder="••••••••"
                 class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none"/>
        </div>

        <button id="login-btn"
                class="w-full bg-primary text-white py-3 rounded-xl font-semibold text-sm hover:bg-primary/90 transition-all shadow-lg shadow-primary/25 flex items-center justify-center gap-2">
          <span id="btn-text">Sign In</span>
          <span id="btn-spinner" class="hidden w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></span>
        </button>
      </div>

      <p class="text-xs text-slate-400 text-center mt-6">
        Only teachers and CRs can log in to update room status.<br/>
        Students can view the dashboard without logging in.
      </p>
    </div>

    <div class="text-center mt-4">
      <a href="/" class="text-sm text-primary hover:underline">← Back to Dashboard</a>
    </div>
  </div>

  <script type="module">
    import { login } from '/js/auth.js';
    import { getUser } from '/js/auth.js';

    // Redirect if already logged in
    const user = await getUser();
    if (user) window.location.href = '/';

    const emailEl   = document.getElementById('email');
    const passEl    = document.getElementById('password');
    const btn       = document.getElementById('login-btn');
    const btnText   = document.getElementById('btn-text');
    const spinner   = document.getElementById('btn-spinner');
    const errorMsg  = document.getElementById('error-msg');

    btn.addEventListener('click', async () => {
      const email    = emailEl.value.trim();
      const password = passEl.value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      // Show loading
      btnText.textContent = 'Signing in…';
      spinner.classList.remove('hidden');
      btn.disabled = true;
      errorMsg.classList.add('hidden');

      try {
        await login(email, password);
        window.location.href = '/';   // redirect to dashboard
      } catch (err) {
        showError(err.message ?? 'Login failed. Please check your credentials.');
      } finally {
        btnText.textContent = 'Sign In';
        spinner.classList.add('hidden');
        btn.disabled = false;
      }
    });

    // Allow Enter key
    passEl.addEventListener('keydown', e => e.key === 'Enter' && btn.click());

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove('hidden');
    }
  </script>
</body>
</html>
