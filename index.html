<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode:"class",
      theme:{ extend:{
        colors:{"primary":"#137fec","background-light":"#f6f7f8","background-dark":"#101922"},
        fontFamily:{"display":["Lexend"]},
        borderRadius:{"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"},
      }},
    }
  </script>
  <title>NIE ClassPulse — Classroom Availability</title>
  <style>
    body{min-height:100dvh;}
    .loader{width:40px;height:40px;border:4px solid #e2e8f0;border-top-color:#137fec;border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">

<!-- Nav -->
<header class="sticky top-0 z-50 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <div class="flex items-center gap-3">
        <div class="bg-primary p-1.5 rounded-lg text-white">
          <span class="material-symbols-outlined block">pulse_alert</span>
        </div>
        <h1 class="text-xl font-bold tracking-tight">NIE ClassPulse</h1>
      </div>
      <div class="hidden md:flex items-center gap-4">
        <a href="https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/edit"
           target="_blank"
           class="flex items-center gap-1.5 text-slate-600 dark:text-slate-400 hover:text-primary px-3 py-2 rounded-lg transition-colors text-sm font-medium border border-slate-200 dark:border-slate-700 hover:border-primary">
          <span class="material-symbols-outlined text-base">table_chart</span>
          NIE Pulse Sheet
        </a>
        <div class="h-8 w-px bg-slate-200 dark:bg-slate-700"></div>
        <span id="user-greeting" class="text-sm text-slate-500 dark:text-slate-400"></span>
        <a id="auth-btn" href="/pages/login.html"
           class="bg-primary text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-primary/90 transition-colors">
          Login
        </a>
      </div>
      <button class="md:hidden text-slate-600 dark:text-slate-300">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 pb-24">

  <!-- Search + Filters -->
  <div class="mb-8">
    <h2 class="text-2xl font-bold mb-6">Find an Available Classroom</h2>
    <div class="flex flex-col md:flex-row gap-4">
      <div class="relative flex-grow">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <span class="material-symbols-outlined text-slate-400">search</span>
        </div>
        <input id="search-input"
               class="block w-full pl-10 pr-3 py-3 border border-slate-200 dark:border-slate-800 rounded-xl bg-white dark:bg-slate-900 focus:ring-2 focus:ring-primary focus:border-transparent text-base transition-all"
               placeholder="Search by room number…" type="text"/>
      </div>
      <button id="search-btn"
              class="bg-primary text-white px-8 py-3 rounded-xl font-semibold hover:bg-primary/90 transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
        <span class="material-symbols-outlined">search</span>Search
      </button>
    </div>
    <!-- Only Building + Status filters -->
    <div class="flex flex-wrap gap-3 mt-4">
      <select id="filter-building"
              class="px-4 py-2 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm font-medium focus:ring-2 focus:ring-primary outline-none cursor-pointer">
        <option value="all">🏢 Building: All</option>
        <option value="Ramanujacharya Block">Ramanujacharya Block</option>
        <option value="Madhwacharya Block">Madhwacharya Block (MB)</option>
      </select>
      <select id="filter-status"
              class="px-4 py-2 rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm font-medium focus:ring-2 focus:ring-primary outline-none cursor-pointer">
        <option value="all">⏱ Status: All</option>
        <option value="vacant">✅ Vacant</option>
        <option value="occupied">🔴 Occupied</option>
        <option value="free_soon">🟡 Free Soon</option>
      </select>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
    <div class="bg-white dark:bg-slate-900 p-5 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center gap-4">
      <div class="size-12 rounded-lg bg-primary/10 flex items-center justify-center text-primary shrink-0">
        <span class="material-symbols-outlined">meeting_room</span>
      </div>
      <div><p class="text-xs text-slate-500 uppercase tracking-wider font-bold">Total</p>
      <p id="stat-total" class="text-2xl font-bold">—</p></div>
    </div>
    <div class="bg-white dark:bg-slate-900 p-5 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center gap-4">
      <div class="size-12 rounded-lg bg-green-100 flex items-center justify-center text-green-600 shrink-0">
        <span class="material-symbols-outlined">event_available</span>
      </div>
      <div><p class="text-xs text-slate-500 uppercase tracking-wider font-bold">Vacant</p>
      <p id="stat-vacant" class="text-2xl font-bold text-green-600">—</p></div>
    </div>
    <div class="bg-white dark:bg-slate-900 p-5 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center gap-4">
      <div class="size-12 rounded-lg bg-red-100 flex items-center justify-center text-red-600 shrink-0">
        <span class="material-symbols-outlined">lock_clock</span>
      </div>
      <div><p class="text-xs text-slate-500 uppercase tracking-wider font-bold">Occupied</p>
      <p id="stat-occupied" class="text-2xl font-bold text-red-600">—</p></div>
    </div>
    <div class="bg-white dark:bg-slate-900 p-5 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center gap-4">
      <div class="size-12 rounded-lg bg-amber-100 flex items-center justify-center text-amber-600 shrink-0">
        <span class="material-symbols-outlined">history</span>
      </div>
      <div><p class="text-xs text-slate-500 uppercase tracking-wider font-bold">Free Soon</p>
      <p id="stat-free-soon" class="text-2xl font-bold text-amber-600">—</p></div>
    </div>
  </div>

  <!-- Room Grid -->
  <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
    <span class="material-symbols-outlined text-primary">grid_view</span>
    Classroom Status
    <span id="room-count" class="text-sm text-slate-400 font-normal ml-1"></span>
  </h3>
  <div id="room-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    <div class="col-span-full flex justify-center py-12"><div class="loader"></div></div>
  </div>
</main>

<!-- Mobile Nav -->
<div class="fixed bottom-0 left-0 right-0 bg-white dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 md:hidden z-50">
  <div class="flex justify-around items-center h-16">
    <a class="flex flex-col items-center gap-1 text-primary" href="#">
      <span class="material-symbols-outlined">dashboard</span>
      <span class="text-[10px] font-bold">Dashboard</span>
    </a>
    <a class="flex flex-col items-center gap-1 text-slate-400"
       href="https://1drv.ms/x/c/2C7F30953A5DF277/IQB9JI02BDvlS5tbXRvorQhuAUTI2xfRY4pavZZQGkfccQY?e=CGQk5f" target="_blank">
      <span class="material-symbols-outlined">table_chart</span>
      <span class="text-[10px] font-medium">Pulse Sheet</span>
    </a>
    <a class="flex flex-col items-center gap-1 text-slate-400" href="/pages/login.html">
      <span class="material-symbols-outlined">person</span>
      <span class="text-[10px] font-medium">Login</span>
    </a>
  </div>
</div>

<script type="module" src="/js/dashboard.js"></script>
</body>
</html>
